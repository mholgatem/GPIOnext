name: Build Rust Extension

# Triggers:
#   - Push of a version tag (v*) → builds + attaches binaries to the GitHub Release
#   - Manual dispatch → useful for testing CI without tagging
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Raspberry Pi 2B / 3 / Zero 2 W  (32-bit ARMv7) - Force GLIBC 2.28 for Buster compatibility
          - target: armv7-unknown-linux-gnueabihf
            arch: armv7l
            # Phase 2: add libgpiod-dev:armhf to apt_packages
            apt_packages: ""

          # Raspberry Pi 3 / 4 / 5 running 64-bit OS
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            # Phase 2: add libgpiod-dev:arm64 to apt_packages
            apt_packages: ""

          # x86_64 for development / testing on desktop Linux
          #- target: x86_64-unknown-linux-gnu
          #  arch: x86_64
            # Phase 2: add libgpiod-dev to apt_packages
          #  apt_packages: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        if: matrix.apt_packages != ''
        run: |
          sudo dpkg --add-architecture armhf
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      # No Python install step needed — abi3-py37 in Cargo.toml handles
      # ABI compatibility; maturin uses whatever Python is on the runner.

      - name: Build with maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: ./core
          args: --release --strip --manifest-path Cargo.toml --out ../dist --features i2c
          manylinux: 2014    # glibc 2.17 floor — covers Pi OS Buster through Bookworm
          before-script-linux: ""

      - name: Extract and rename output binary
        run: |
          sudo chown -R "$USER" dist/
          unzip dist/*.whl -d dist/tmp
          find dist/tmp -name "*.so" -exec mv {} dist/gpionext_core-${{ matrix.arch }}.so \;
          rm -rf dist/tmp dist/*.whl
          echo "Built: $(ls dist/)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpionext_core-${{ matrix.arch }}
          path: dist/gpionext_core-${{ matrix.arch }}.so

      - name: Attach binary to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gpionext_core-${{ matrix.arch }}.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
