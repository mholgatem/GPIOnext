name: Build Rust Extension

# Triggers:
#   - Push of a version tag (v*) → builds + attaches binaries to the GitHub Release
#   - Manual dispatch → useful for testing CI without tagging
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Raspberry Pi 2B / 3 / Zero 2 W  (32-bit ARMv7) - Force GLIBC 2.28 for Buster compatibility
          - target: armv7-unknown-linux-gnueabihf
            arch: armv7l
            # Phase 2: add libgpiod-dev:armhf to apt_packages
            apt_packages: ""

          # Raspberry Pi 3 / 4 / 5 running 64-bit OS
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            # Phase 2: add libgpiod-dev:arm64 to apt_packages
            apt_packages: ""

          # x86_64 for development / testing on desktop Linux
          #- target: x86_64-unknown-linux-gnu
          #  arch: x86_64
            # Phase 2: add libgpiod-dev to apt_packages
          #  apt_packages: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        if: matrix.apt_packages != ''
        run: |
          sudo dpkg --add-architecture armhf
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # No Python install step needed — abi3-py37 in Cargo.toml handles
      # ABI compatibility; maturin uses whatever Python is on the runner.

      - name: Build with maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: ./core
          args: --release --strip --manifest-path Cargo.toml --out ../dist --features i2c
          manylinux: 2014    # glibc 2.17 floor — covers Pi OS Buster through Bookworm
          before-script-linux: ""

      - name: Extract and rename output binary
        run: |
          sudo chown -R "$USER" dist/
          unzip dist/*.whl -d dist/tmp
          find dist/tmp -name "*.so" -exec mv {} dist/gpionext_core-${{ matrix.arch }}.so \;
          rm -rf dist/tmp dist/*.whl
          echo "Built: $(ls dist/)"

      - name: Install cross-compilation toolchain for config-manager
        run: |
          case "${{ matrix.target }}" in
            armv7-unknown-linux-gnueabihf)
              sudo apt-get install -y gcc-arm-linux-gnueabihf ;;
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu ;;
          esac

      - name: Build config-manager and daemon binaries
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          # config-manager (no GPIO/I2C needed)
          cargo build --release -p gpionext-config --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/gpionext-config \
             dist/gpionext-config-${{ matrix.arch }}

          # daemon (GPIO + I2C; same features as the .so)
          cargo build --release -p gpionext \
            --target ${{ matrix.target }} \
            --no-default-features --features gpio,i2c
          cp target/${{ matrix.target }}/release/gpionext \
             dist/gpionext-${{ matrix.arch }}

          echo "Dist: $(ls dist/)"

      - name: Pack release tarball
        run: |
          mkdir -p dist/pkg
          cp dist/gpionext-${{ matrix.arch }}         dist/pkg/gpionext
          cp dist/gpionext-config-${{ matrix.arch }}  dist/pkg/gpionext-config
          cp dist/gpionext_core-${{ matrix.arch }}.so dist/pkg/gpionext_core.so
          echo "${{ steps.version.outputs.VERSION }}" > dist/pkg/VERSION
          tar -czf dist/gpionext-${{ matrix.arch }}.tar.gz -C dist/pkg .
          echo "Tarball: $(ls -lh dist/gpionext-${{ matrix.arch }}.tar.gz)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpionext-${{ matrix.arch }}
          path: dist/gpionext-${{ matrix.arch }}.tar.gz

      - name: Attach binaries to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gpionext-${{ matrix.arch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}